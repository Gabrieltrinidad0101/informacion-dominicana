services:
  download:
    build:
      context: ./reBuild
      dockerfile: ./download/dockerfile
    container_name: download
    volumes:
      - ./reBuild/download:/app/download
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ai_process:
    build:
      context: ./reBuild
      dockerfile: ./aiProcess/dockerfile
    container_name: aiProcess
    volumes:
      - ./reBuild/aiProcess:/app/aiProcess
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  insert_data:
    build:
      context: ./reBuild
      dockerfile: ./insertData/dockerfile
    container_name: insertData
    volumes:
      - ./reBuild/insertData:/app/insertData
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  export_to_json:
    build:
      context: ./reBuild
      dockerfile: ./exportToJson/dockerfile
    container_name: exportToJson
    volumes:
      - ./reBuild/exportToJson:/app/exportToJson
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  validate_id:
    build:
      context: ./reBuild
      dockerfile: ./validateId/dockerfile
    container_name: validateId
    volumes:
      - ./reBuild/validateId:/app/validateId
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  files_manager:
    build:
      context: ./reBuild
      dockerfile: ./filesManager/dockerfile
    container_name: filesManager
    networks:
      - dev
    ports:
      - 4000:4000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pii:
    build:
      context: ./reBuild/pii
      dockerfile: dockerfile
    container_name: pii
    volumes:
      - ./reBuild/pii:/app
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    volumes:
      - ./volumes/rabbitmq/data:/var/lib/rabbitmq
      - ./volumes/rabbitmq/logs:/var/log/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:latest
    container_name: mongo
    volumes:
      - ./volumes/mongo/data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    networks:
      - dev
    ports:
      - 27017:27017
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - 3100:3100
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/promtail-config.yaml
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "5000:3000"
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: informacion-dominicana
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio
    volumes:
      - minio-data:/data
    networks:
      - dev
    environment:
      - MINIO_ROOT_USER=MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD=MINIO_ROOT_PASSWORD
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  minio-data:

networks:
  dev:
    driver: bridge
